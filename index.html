<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Document Assistant</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    background: #f4f6f8;
    color: #222;
  }
  h1 {
    color: #2c3e50;
  }
  textarea, input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
  }
  textarea {
    height: 150px;
  }
  button {
    background: #2c7be5;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover {
    background: #1a5fc4;
  }
  #historyBox {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .question-bubble {
    align-self: flex-end;
    background: #2c7be5;
    color: white;
    padding: 10px 14px;
    border-radius: 12px 12px 0 12px;
    max-width: 80%;
  }
  .answer-bubble {
    align-self: flex-start;
    background: white;
    border: 1px solid #ddd;
    padding: 10px 14px;
    border-radius: 12px 12px 12px 0;
    max-width: 80%;
    white-space: pre-wrap;
  }
  button:disabled {
    background: #aac4e8;
    cursor: not-allowed;
  }
  #clearBtn {
    background: #888;
    margin-left: 8px;
  }
  #clearBtn:hover {
    background: #666;
  }
</style>
</head>
<body>

  <h1>📄 AI Document Assistant</h1>
  <p>Paste a document and ask as many questions as you like — the chat history is kept below.</p>

  <label>1. Your document text:</label>
  <textarea id="docInput" placeholder="Paste your document content here..."></textarea>

  <label>2. Your question:</label>
  <input type="text" id="questionInput" placeholder="e.g. What is this document about?">

  <button id="askBtn">Ask AI</button>
  <button id="clearBtn">Clear Chat</button>

  <div id="historyBox"></div>

<script>
  // ---- Multiple questions + chat history ---- //

  const askBtn = document.getElementById("askBtn");
  const clearBtn = document.getElementById("clearBtn");
  const historyBox = document.getElementById("historyBox");
  const docInput = document.getElementById("docInput");
  const questionInput = document.getElementById("questionInput");

  // ⚠️ Paste your Gemini API key here (get one for free at aistudio.google.com/apikey)
  const API_KEY = "YOUR_GEMINI_API_KEY_HERE";

  askBtn.addEventListener("click", async function () {
    const doc = docInput.value;
    const question = questionInput.value;

    if (!doc || !question) {
      alert("Please fill in both the document and the question!");
      return;
    }

    // Add the question as a chat "bubble" to the history
    // document.createElement -> creates a new HTML element in JS
    const qBubble = document.createElement("div");
    qBubble.className = "question-bubble"; // applies the matching style from CSS
    qBubble.textContent = question;
    historyBox.appendChild(qBubble); // adds the element into historyBox

    // Create a temporary "loading" bubble for the answer
    const aBubble = document.createElement("div");
    aBubble.className = "answer-bubble";
    aBubble.textContent = "⏳ Thinking...";
    historyBox.appendChild(aBubble);

    // Clear the question box so the next question is easy to type
    questionInput.value = "";

    // Disable the button so the user can't double-click while waiting
    askBtn.disabled = true;

    const prompt = `Based on the following document, answer the question clearly and concisely.

Document:
${doc}

Question: ${question}

Answer:`;

    try {
      const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-goog-api-key": API_KEY
          },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        }
      );

      const data = await response.json();
      const aiAnswer = data.candidates[0].content.parts[0].text;

      // Replace the loading bubble with the real AI answer
      aBubble.textContent = aiAnswer;

    } catch (error) {
      aBubble.textContent = "❌ Error: " + error.message;
      console.error(error);
    } finally {
      // "finally" always runs, whether the request succeeded or failed
      askBtn.disabled = false;
    }
  });

  // Pressing Enter also asks the question (no need to click the button)
  questionInput.addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
      askBtn.click();
    }
  });

  // Clear chat button -> empties the history
  clearBtn.addEventListener("click", function () {
    historyBox.innerHTML = "";
  });
</script>

</body>
</html>
